<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FocusForge AI | Private Task Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* CSS styles – full version available, but I'll condense here */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: #f1f5f9; font-family: system-ui; padding: 1rem; }
        .app { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.5rem; backdrop-filter: blur(10px); }
        /* ... more styles */
    </style>
</head>
<body>
    <div class="app" id="app">
        <header>
            <h1>🔨 FocusForge AI</h1>
            <button id="resetBtn">⟳ Reset All</button>
        </header>
        
        <!-- Task form -->
        <div class="task-form">
            <input type="text" id="taskInput" placeholder="What needs to be done?">
            <input type="date" id="dueDateInput">
            <select id="prioritySelect">
                <option value="low">🔵 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
            </select>
            <button id="addBtn">+ Add</button>
        </div>
        
        <!-- AI Prioritize button -->
        <div class="ai-section">
            <button id="aiPrioritizeBtn" class="ai-btn">✨ AI Prioritize (local)</button>
            <span id="aiStatus"></span>
        </div>
        
        <!-- Filter / Sort controls -->
        <div class="controls">
            <select id="filterStatus">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
            </select>
            <select id="filterPriority">
                <option value="all">All priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button id="sortDueBtn">📅 Sort by due date</button>
            <button id="clearCompletedBtn">Clear completed</button>
        </div>
        
        <!-- Task list -->
        <ul id="taskList"></ul>
        
        <!-- Focus timer -->
        <div class="focus-timer">
            <h3>🎯 Focus Timer</h3>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="timerStartPause">Start</button>
                <button id="timerReset">Reset</button>
            </div>
        </div>
        
        <!-- Footer stats -->
        <div class="footer">
            <span id="taskCount"></span>
            <button id="exportBtn">📤 Export tasks</button>
            <button id="importBtn">📥 Import tasks</button>
        </div>
    </div>

    <!-- Load TensorFlow.js from CDN (free, always available) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script>
        // ========================
        // ENTIRE JAVASCRIPT LOGIC
        // ========================
        (function(){
            // ----- Storage -----
            let tasks = [];
            let timer = { minutes: 25, seconds: 0, active: false, interval: null };
            
            // DOM elements
            const taskList = document.getElementById('taskList');
            const taskInput = document.getElementById('taskInput');
            const dueDateInput = document.getElementById('dueDateInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const addBtn = document.getElementById('addBtn');
            const filterStatus = document.getElementById('filterStatus');
            const filterPriority = document.getElementById('filterPriority');
            const sortDueBtn = document.getElementById('sortDueBtn');
            const clearCompletedBtn = document.getElementById('clearCompletedBtn');
            const taskCountSpan = document.getElementById('taskCount');
            const aiPrioritizeBtn = document.getElementById('aiPrioritizeBtn');
            const aiStatusSpan = document.getElementById('aiStatus');
            const exportBtn = document.getElementById('exportBtn');
            const importBtn = document.getElementById('importBtn');
            const resetBtn = document.getElementById('resetBtn');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerStartPause = document.getElementById('timerStartPause');
            const timerReset = document.getElementById('timerReset');
            
            // Load tasks from localStorage
            function loadTasks() {
                const stored = localStorage.getItem('focusforge_tasks');
                if (stored) {
                    tasks = JSON.parse(stored);
                } else {
                    tasks = [];
                }
                renderTasks();
            }
            
            function saveTasks() {
                localStorage.setItem('focusforge_tasks', JSON.stringify(tasks));
                updateTaskCount();
            }
            
            function updateTaskCount() {
                const active = tasks.filter(t => !t.completed).length;
                taskCountSpan.textContent = `${active} active task${active !== 1 ? 's' : ''}`;
            }
            
            // Render tasks with filters & sorting
            let sortByDue = false;
            function renderTasks() {
                let filtered = [...tasks];
                // status filter
                const status = filterStatus.value;
                if (status === 'active') filtered = filtered.filter(t => !t.completed);
                if (status === 'completed') filtered = filtered.filter(t => t.completed);
                // priority filter
                const priority = filterPriority.value;
                if (priority !== 'all') filtered = filtered.filter(t => t.priority === priority);
                // sort by due date if active
                if (sortByDue) {
                    filtered.sort((a, b) => {
                        if (!a.dueDate && !b.dueDate) return 0;
                        if (!a.dueDate) return 1;
                        if (!b.dueDate) return -1;
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    });
                }
                
                taskList.innerHTML = '';
                filtered.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const leftDiv = document.createElement('div');
                    leftDiv.className = 'task-left';
                    leftDiv.addEventListener('click', () => toggleComplete(task.id));
                    
                    const textSpan = document.createElement('span');
                    textSpan.className = 'task-text';
                    textSpan.textContent = task.text;
                    leftDiv.appendChild(textSpan);
                    
                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'task-meta';
                    const prioritySpan = document.createElement('span');
                    prioritySpan.className = `priority ${task.priority}`;
                    prioritySpan.textContent = task.priority === 'low' ? '🔵 Low' : (task.priority === 'medium' ? '🟡 Medium' : '🔴 High');
                    metaDiv.appendChild(prioritySpan);
                    if (task.dueDate) {
                        const dueSpan = document.createElement('span');
                        dueSpan.className = 'due-date';
                        dueSpan.textContent = new Date(task.dueDate).toLocaleDateString();
                        metaDiv.appendChild(dueSpan);
                    }
                    
                    const delBtn = document.createElement('button');
                    delBtn.textContent = '✗';
                    delBtn.className = 'delete-btn';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTask(task.id);
                    });
                    
                    li.appendChild(leftDiv);
                    li.appendChild(metaDiv);
                    li.appendChild(delBtn);
                    taskList.appendChild(li);
                });
                updateTaskCount();
            }
            
            function addTask() {
                const text = taskInput.value.trim();
                if (!text) return;
                const dueDate = dueDateInput.value || null;
                const priority = prioritySelect.value;
                const newTask = {
                    id: Date.now(),
                    text,
                    completed: false,
                    priority,
                    dueDate,
                    createdAt: new Date().toISOString()
                };
                tasks.push(newTask);
                taskInput.value = '';
                dueDateInput.value = '';
                prioritySelect.value = 'medium';
                saveTasks();
                renderTasks();
            }
            
            function toggleComplete(id) {
                const task = tasks.find(t => t.id === id);
                if (task) task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
            
            function deleteTask(id) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
            
            function clearCompleted() {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
                renderTasks();
            }
            
            function resetAll() {
                if (confirm('Delete all tasks? This cannot be undone.')) {
                    tasks = [];
                    saveTasks();
                    renderTasks();
                }
            }
            
            function exportTasks() {
                const dataStr = JSON.stringify(tasks, null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `focusforge_backup_${new Date().toISOString().slice(0,19)}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }
            
            function importTasks() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = event => {
                        try {
                            const imported = JSON.parse(event.target.result);
                            if (Array.isArray(imported)) {
                                tasks = imported;
                                saveTasks();
                                renderTasks();
                                alert('Tasks imported successfully.');
                            } else {
                                alert('Invalid file format.');
                            }
                        } catch (err) {
                            alert('Error parsing file.');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
            
            // ---------- AI Prioritization (TensorFlow.js) ----------
            // We'll use a very simple pretrained model (sentiment analysis) to simulate priority scoring.
            // In reality, you can train a tiny model for task urgency, but here we'll use a rule‑based + ML mix.
            // Since we don't want external API, we use a lightweight model that runs locally.
            // For brevity, I'll implement a deterministic AI that uses heuristics + a simple TF model placeholder.
            // You can replace with your own model later.
            
            let model = null;
            async function loadModel() {
                // For demo, we'll simulate model loading. In production, load a real model from a URL.
                aiStatusSpan.textContent = 'Loading AI model...';
                // Placeholder: just wait a bit and pretend.
                await new Promise(resolve => setTimeout(resolve, 500));
                // You can load a real TensorFlow.js model like:
                // model = await tf.loadLayersModel('https://example.com/model.json');
                model = { loaded: true }; // dummy
                aiStatusSpan.textContent = 'AI ready!';
            }
            
            async function prioritizeWithAI() {
                if (!model) {
                    aiStatusSpan.textContent = 'Model not ready yet. Please wait.';
                    return;
                }
                if (tasks.length === 0) return;
                aiStatusSpan.textContent = 'AI thinking...';
                
                // Simulate AI prioritization: assign a score based on text, due date, etc.
                // This is a rule‑based "AI" – no API cost.
                const updatedTasks = tasks.map(task => {
                    let score = 0;
                    // Urgency from due date: if due in 1 day, high urgency
                    if (task.dueDate) {
                        const daysDiff = (new Date(task.dueDate) - new Date()) / (1000*3600*24);
                        if (daysDiff < 1) score += 10;
                        else if (daysDiff < 3) score += 5;
                        else if (daysDiff < 7) score += 2;
                    }
                    // Keyword importance
                    const textLower = task.text.toLowerCase();
                    if (textLower.includes('urgent') || textLower.includes('deadline')) score += 8;
                    if (textLower.includes('important')) score += 6;
                    if (textLower.includes('client') || textLower.includes('boss')) score += 5;
                    if (textLower.includes('meeting')) score += 4;
                    // Priority from user selection (already set, but we can override)
                    // We'll not override, just use the existing priority as base
                    const priorityWeight = { low: 1, medium: 3, high: 5 };
                    score += priorityWeight[task.priority];
                    
                    // Decide new priority based on score
                    let newPriority = 'low';
                    if (score >= 12) newPriority = 'high';
                    else if (score >= 6) newPriority = 'medium';
                    
                    return { ...task, priority: newPriority };
                });
                
                tasks = updatedTasks;
                saveTasks();
                renderTasks();
                aiStatusSpan.textContent = 'AI prioritization complete!';
                setTimeout(() => { aiStatusSpan.textContent = ''; }, 3000);
            }
            
            // ---------- Focus Timer ----------
            function updateTimerDisplay() {
                timerDisplay.textContent = `${String(timer.minutes).padStart(2,'0')}:${String(timer.seconds).padStart(2,'0')}`;
            }
            
            function startTimer() {
                if (timer.interval) clearInterval(timer.interval);
                timer.active = true;
                timer.interval = setInterval(() => {
                    if (timer.seconds === 0) {
                        if (timer.minutes === 0) {
                            // Time's up
                            clearInterval(timer.interval);
                            timer.active = false;
                            timer.interval = null;
                            timerStartPause.textContent = 'Start';
                            // Notify
                            if ('Notification' in window && Notification.permission === 'granted') {
                                new Notification('Focus session complete! Time for a break.');
                            } else {
                                alert('Focus session complete!');
                            }
                        } else {
                            timer.minutes--;
                            timer.seconds = 59;
                        }
                    } else {
                        timer.seconds--;
                    }
                    updateTimerDisplay();
                }, 1000);
                timerStartPause.textContent = 'Pause';
            }
            
            function pauseTimer() {
                if (timer.interval) {
                    clearInterval(timer.interval);
                    timer.interval = null;
                }
                timer.active = false;
                timerStartPause.textContent = 'Start';
            }
            
            function resetTimer() {
                pauseTimer();
                timer.minutes = 25;
                timer.seconds = 0;
                updateTimerDisplay();
            }
            
            function toggleTimer() {
                if (timer.active) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            }
            
            // ---------- Initialization ----------
            function init() {
                loadTasks();
                loadModel(); // async, doesn't block UI
                
                // Event listeners
                addBtn.addEventListener('click', addTask);
                clearCompletedBtn.addEventListener('click', clearCompleted);
                sortDueBtn.addEventListener('click', () => {
                    sortByDue = !sortByDue;
                    sortDueBtn.classList.toggle('active', sortByDue);
                    renderTasks();
                });
                filterStatus.addEventListener('change', renderTasks);
                filterPriority.addEventListener('change', renderTasks);
                exportBtn.addEventListener('click', exportTasks);
                importBtn.addEventListener('click', importTasks);
                resetBtn.addEventListener('click', resetAll);
                aiPrioritizeBtn.addEventListener('click', prioritizeWithAI);
                timerStartPause.addEventListener('click', toggleTimer);
                timerReset.addEventListener('click', resetTimer);
                
                // Request notification permission
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
                
                // Keyboard shortcut: Enter to add task
                taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
            }
            
            init();
        })();
    </script>
</body>
</html>
