<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Omni Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Omni Task Manager</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What needs to be shipped?">
            <button id="addBtn">+ Add Task</button>
        </div>
        <ul id="taskList"></ul>
        <div class="footer">
            <button id="clearBtn">Clear All</button>
            <span id="taskCount"></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
